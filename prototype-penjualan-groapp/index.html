<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Prototype Penjualan</title><style>body{margin:0;background:#f7f8fa;font-family:Inter,system-ui,sans-serif;color:#333}.app{display:flex;min-height:100vh}.side{width:260px;background:#fff;border-right:1px solid #e5e9ef;padding:24px}.hide .side{display:none}.logo{font-size:21px;font-weight:900;color:#008466;margin-bottom:20px}.nav div{padding:11px;border-radius:12px;font-weight:750}.nav .on{background:#fff0eb;color:#ff6333}.main{flex:1}.top{height:72px;background:#fff;border-bottom:1px solid #e5e9ef;display:flex;align-items:center;gap:12px;padding:0 24px}.tog,.btn{height:42px;border:1px solid #e5e9ef;border-radius:14px;background:#fff;color:#ff6333;font-weight:850;padding:0 16px;cursor:pointer}.primary{background:#ff6333;color:#fff;border-color:#ff6333}.danger{color:#d92d20;border-color:#ffd0d0;background:#fff5f5}.content{padding:24px}.page{max-width:1260px}.card{background:#fff;border:1px solid #e5e9ef;border-radius:22px;padding:22px;margin-bottom:18px}.head{display:flex;justify-content:space-between;gap:16px;margin-bottom:18px}.h1{font-size:24px;font-weight:900}.h2{font-size:18px;font-weight:900;margin-bottom:14px}.muted{color:#7a8494;font-weight:700}.sum{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.sum>div{border:1px solid #e5e9ef;border-radius:16px;padding:14px}.tools{display:flex;justify-content:space-between;gap:12px;margin:18px 0}.search{height:42px;border:1px solid #e5e9ef;border-radius:14px;padding:0 12px;width:340px}.tabs{display:flex;gap:18px;border-bottom:1px solid #e5e9ef}.tab{height:38px;font-weight:900;color:#98a2b3;cursor:pointer}.tab.on{color:#ff6333;border-bottom:2px solid #ff6333}table{width:100%;border-collapse:collapse}th,td{padding:12px;border-bottom:1px solid #eef1f5;text-align:left}th{background:#fbfcfd;font-size:13px}.table{border:1px solid #e5e9ef;border-radius:18px;margin-top:12px;overflow:visible}.badge{border-radius:99px;padding:6px 10px;font-size:12px;font-weight:900}.draft{background:#f2f4f7;color:#667085}.unpaid{background:#fff4e5;color:#d87900}.paid{background:#e9f8f1;color:#0d8a5f}.void{background:#f4f0ff;color:#6941c6}.canceled{background:#fff0f0;color:#c5221f}.menu{display:none;position:absolute;right:8px;top:40px;width:210px;background:#fff;border:1px solid #e5e9ef;border-radius:14px;padding:8px;box-shadow:0 14px 28px #0001;z-index:10}.menu.show{display:block}.mi{padding:9px;border-radius:10px;font-weight:800;cursor:pointer}.mi:hover{background:#f6f8fa}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.field{display:flex;flex-direction:column;gap:7px}.field label{font-size:13px;font-weight:900;color:#667085}.field input,.field select,.field textarea{height:42px;border:1px solid #e5e9ef;border-radius:12px;padding:0 10px}.field textarea{height:100px;padding:10px}.field input:disabled,.field select:disabled,.field textarea:disabled{background:#f8fafc}.lineTable{border:1px solid #e5e9ef;border-radius:16px;overflow:auto}.lineTable table{min-width:1400px}.lineTable input,.lineTable select{height:38px;border:1px solid #e5e9ef;border-radius:10px;padding:0 8px;width:100%}.summary{display:grid;grid-template-columns:1fr 1fr;gap:16px}.box{background:#fbfcfd;border:1px solid #eef1f5;border-radius:16px;padding:14px}.line,.total{display:flex;justify-content:space-between;border-bottom:1px dashed #dfe5ec;padding:10px 0;font-weight:850}.total{font-size:19px;border:0}.actions{display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap;margin-top:18px}.hidden{display:none}.modal{position:fixed;inset:0;background:#18202a55;display:none;align-items:center;justify-content:center;padding:24px;z-index:99}.modal.show{display:flex}.modalbox{width:min(560px,100%);background:white;border-radius:22px;padding:22px}.toast{position:fixed;right:22px;bottom:22px;background:white;border:1px solid #e5e9ef;border-radius:16px;padding:14px;box-shadow:0 14px 28px #0001;display:none}.toast.show{display:block}@media(max-width:900px){.sum,.grid,.summary{grid-template-columns:1fr}.side{display:none}.tools,.head{flex-direction:column}}</style></head><body><div class="app hide" id="app"><aside class="side"><div class="logo">GroApp Accounting</div><div class="nav"><div>Dashboard</div><div>Kas & Bank</div><div>Kontak</div><div>Produk</div><div class="on">Penjualan</div><div>Pembelian</div></div></aside><main class="main"><div class="top"><button class="tog" onclick="app.classList.toggle('hide')">☰</button><div class="h1" id="ptitle">Manajemen Penjualan</div></div><div class="content"><div id="listPage" class="page card"><div class="head"><div><div class="h1">Daftar Penjualan</div><div class="muted">Diskon menggunakan persen. Pajak berupa dropdown PPN atau PPh.</div></div></div><div class="sum"><div>Total<br><b id="sTotal"></b><small id="cTotal"></small></div><div>Draft<br><b id="sDraft"></b><small id="cDraft"></small></div><div>Belum Lunas<br><b id="sUnpaid"></b><small id="cUnpaid"></small></div><div>Lunas<br><b id="sPaid"></b><small id="cPaid"></small></div></div><div class="tools"><input id="q" class="search" placeholder="Cari invoice atau pelanggan..."><div><button class="btn">Ekspor</button> <button class="btn primary" onclick="openForm()">＋ Tambah Penjualan</button></div></div><div class="tabs"><div class="tab on" data-f="all" id="tabAll"></div><div class="tab" data-f="draft" id="tabDraft"></div><div class="tab" data-f="unpaid" id="tabUnpaid"></div><div class="tab" data-f="paid" id="tabPaid"></div></div><div class="table"><table><thead><tr><th>No</th><th>No Invoice</th><th>Pelanggan</th><th>Pembayaran</th><th>Piutang</th><th>Status</th><th>Aksi</th></tr></thead><tbody id="tbody"></tbody></table></div></div><div id="workPage" class="page hidden"></div></div></main></div><div class="modal" id="confirmModal"><div class="modalbox"><div class="h1" id="confirmTitle">Konfirmasi</div><p class="muted" id="confirmText"></p><div class="actions"><button class="btn" onclick="closeConfirm()">Batal</button><button class="btn danger" id="confirmYes">Ya</button></div></div></div><div class="toast" id="toastBox"><b id="tt"></b><div id="tb" class="muted"></div></div><script>const master={"Jasa Perawatan Asset":{desc:"Jasa maintenance aset kantor",unit:"Paket",price:2000000},"Susu Ultra Milk":{desc:"Susu UHT ukuran 1 liter",unit:"Pcs",price:25000},"Air Mineral Aqua":{desc:"Air mineral 600 ml",unit:"Botol",price:4000},"Jasa Instalasi":{desc:"Jasa instalasi perangkat",unit:"Paket",price:1750000}};let sales=[{no:'INV-2026-0001',cust:'PT Sumber Makmur',sales:'Dimas',paid:0,due:2450000,status:'draft',date:'2026-07-08',items:[['Susu Ultra Milk','Susu UHT ukuran 1 liter',2,'Pcs',25000,0,'PPN',11]]},{no:'INV-2026-0002',cust:'Toko Berkah Jaya',sales:'Shania',paid:750000,due:1250000,status:'unpaid',date:'2026-07-08',items:[['Jasa Perawatan Asset','Jasa maintenance aset kantor',1,'Paket',2000000,0,'PPN',11]]},{no:'INV-2026-0004',cust:'Warung Kopi Bahagia',sales:'Dimas',paid:0,due:880000,status:'unpaid',date:'2026-07-07',items:[['Susu Ultra Milk','Susu UHT ukuran 1 liter',4,'Pcs',220000,0,'PPN',11]]},{no:'INV-2026-0003',cust:'CV Mandiri Sentosa',sales:'Tiara',paid:3200000,due:0,status:'paid',date:'2026-07-07',items:[['Air Mineral Aqua','Air mineral 600 ml',10,'Botol',320000,0,'PPN',11]]}];let filter='all',query='',rows=[],editingIndex=null,pending=null;const rp=n=>'Rp '+new Intl.NumberFormat('id-ID').format(Math.max(0,+n||0)),nf=n=>new Intl.NumberFormat('id-ID').format(Math.max(0,+n||0)),num=s=>+(String(s||'').replace(/[^0-9]/g,''))||0,label=s=>s==='draft'?'Draft':s==='unpaid'?'Belum Lunas':s==='paid'?'Lunas':s==='void'?'Void':'Dibatalkan';function toast(a,b){tt.textContent=a;tb.textContent=b;toastBox.classList.add('show');setTimeout(()=>toastBox.classList.remove('show'),2200)}function showList(){workPage.classList.add('hidden');listPage.classList.remove('hidden');ptitle.textContent='Manajemen Penjualan';renderList()}function hideList(t){listPage.classList.add('hidden');workPage.classList.remove('hidden');ptitle.textContent=t}function renderTabs(){let c={all:sales.length,draft:sales.filter(x=>x.status==='draft').length,unpaid:sales.filter(x=>x.status==='unpaid').length,paid:sales.filter(x=>x.status==='paid').length};tabAll.textContent=`Semua (${c.all})`;tabDraft.textContent=`Draft (${c.draft})`;tabUnpaid.textContent=`Belum Lunas (${c.unpaid})`;tabPaid.textContent=`Lunas (${c.paid})`}function renderList(){renderTabs();let data=sales.map((x,i)=>({x,i})).filter(o=>(filter==='all'||o.x.status===filter)&&(!query||o.x.no.toLowerCase().includes(query)||o.x.cust.toLowerCase().includes(query)));tbody.innerHTML=data.map(({x,i},n)=>`<tr><td>${n+1}</td><td><b>${x.no}</b></td><td>${x.cust}</td><td>${rp(x.paid)}</td><td>${rp(x.due)}</td><td><span class="badge ${x.status}">${label(x.status)}</span></td><td style="position:relative"><button class="btn" onclick="toggleMenu(event,this)">⋮</button><div class="menu">${menu(x.status,i)}</div></td></tr>`).join('');let s={total:0,draft:0,unpaid:0,paid:0};sales.forEach(x=>{let v=x.paid+x.due;s.total+=v;if(x.status in s)s[x.status]+=x.status==='unpaid'?x.due:v});sTotal.textContent=rp(s.total);cTotal.textContent=sales.length+' invoice';sDraft.textContent=rp(s.draft);cDraft.textContent=sales.filter(x=>x.status==='draft').length+' invoice';sUnpaid.textContent=rp(s.unpaid);cUnpaid.textContent=sales.filter(x=>x.status==='unpaid').length+' invoice';sPaid.textContent=rp(s.paid);cPaid.textContent=sales.filter(x=>x.status==='paid').length+' invoice'}function menu(s,i){let d=`<div class="mi" onclick="showDetail(${i})">Lihat Detail</div>`;if(s==='draft')return d+`<div class="mi" onclick="openForm(${i})">Edit</div><div class="mi danger" onclick="askDelete(${i})">Hapus</div>`;if(s==='unpaid')return d+`<div class="mi" onclick="showPayment(${i})">Update Pembayaran</div><div class="mi danger" onclick="askCancel(${i})">Batalkan</div>`;return d}function toggleMenu(e,b){e.stopPropagation();document.querySelectorAll('.menu').forEach(m=>m.classList.remove('show'));b.nextElementSibling.classList.add('show')}document.addEventListener('click',()=>document.querySelectorAll('.menu').forEach(m=>m.classList.remove('show')));function askDelete(i){confirmTitle.textContent='Hapus Penjualan?';confirmText.textContent=`Data ${sales[i].no} akan dihapus.`;pending=()=>{sales.splice(i,1);closeConfirm();toast('Terhapus','Draft berhasil dihapus.');showList()};confirmModal.classList.add('show')}function askCancel(i){confirmTitle.textContent='Batalkan Penjualan?';confirmText.textContent=`Invoice ${sales[i].no} akan dibatalkan.`;pending=()=>{sales[i].status='canceled';closeConfirm();showList()};confirmModal.classList.add('show')}function askVoid(i){confirmTitle.textContent='Void Invoice?';confirmText.textContent=`Invoice ${sales[i].no} akan berubah menjadi Void dan tidak dapat diedit.`;pending=()=>{sales[i].status='void';sales[i].due=0;closeConfirm();toast('Invoice void',`${sales[i].no} sudah Void.`);showDetail(i)};confirmModal.classList.add('show')}function closeConfirm(){confirmModal.classList.remove('show');pending=null}confirmYes.onclick=()=>pending&&pending();function seed(s){rows=[];(s?.items||[['','','',1,'',0,0,'PPN',11]]).forEach(it=>rows.push({p:it[0]||'',d:it[1]||'',q:it[2]||1,u:it[3]||'',h:it[4]||0,disc:it[5]||0,taxType:it[6]||'PPN',taxRate:it[7]||11}))}function rowCalc(x){let base=(+x.q||0)*(+x.h||0),disc=base*((+x.disc||0)/100),net=Math.max(0,base-disc),tax=net*((+x.taxRate||0)/100);if(x.taxType==='PPh')tax=-tax;return{base,disc,net,tax,total:Math.max(0,net+tax)}}function calc(){let s=rows.reduce((a,x)=>{let d=rowCalc(x);a.base+=d.base;a.disc+=d.disc;a.tax+=d.tax;a.total+=d.total;return a},{base:0,disc:0,tax:0,total:0}),paid=num(dp?.value),dueAmt=s.total-paid;beforeDisc.textContent=rp(s.base);discTotal.textContent=rp(s.disc);afterDisc.textContent=rp(s.base-s.disc);taxTotal.textContent=(s.tax<0?'- ':'')+rp(Math.abs(s.tax));tot.textContent=rp(s.total);due.textContent=rp(dueAmt);return{total:s.total,due:dueAmt}}function addRow(){rows.push({p:'',d:'',q:1,u:'',h:0,disc:0,taxType:'PPN',taxRate:11});renderRows()}function applyMaster(i,v){rows[i].p=v;if(master[v]){rows[i].d=master[v].desc;rows[i].u=master[v].unit;rows[i].h=master[v].price}renderRows()}function renderRows(ro=false){let dis=ro?'disabled':'';items.innerHTML=rows.map((x,i)=>`<tr><td><select ${dis} onchange="applyMaster(${i},this.value)"><option value="">Pilih Produk/Jasa</option>${Object.keys(master).map(k=>`<option ${x.p===k?'selected':''}>${k}</option>`).join('')}</select></td><td><input ${dis} value="${x.d}" oninput="rows[${i}].d=this.value"></td><td><input ${dis} value="${x.q}" type="number" oninput="rows[${i}].q=this.value;renderRows()"></td><td><input ${dis} value="${x.u}" oninput="rows[${i}].u=this.value"></td><td><input ${dis} value="${x.h?nf(x.h):''}" oninput="rows[${i}].h=num(this.value);this.value=rows[${i}].h?nf(rows[${i}].h):'';renderRows()"></td><td><input ${dis} type="number" min="0" max="100" value="${x.disc||''}" placeholder="0" oninput="rows[${i}].disc=this.value;renderRows()"></td><td><select ${dis} onchange="rows[${i}].taxType=this.value;renderRows()"><option ${x.taxType==='PPN'?'selected':''}>PPN</option><option ${x.taxType==='PPh'?'selected':''}>PPh</option></select></td><td><input ${dis} type="number" min="0" value="${x.taxRate||''}" oninput="rows[${i}].taxRate=this.value;renderRows()"></td><td><b>${rp(rowCalc(x).total)}</b></td><td>${ro?'':`<button class="btn danger" onclick="rows.splice(${i},1);renderRows()">Hapus</button>`}</td></tr>`).join('');calc()}function formHtml(title,ro=false,pay=false){let dis=ro||pay?'disabled':'';return `<div class="head"><div><button class="btn" onclick="showList()">← Kembali</button><div class="h1" style="margin-top:14px">${title}</div><div class="muted">${pay?'Hanya pembayaran yang bisa diubah.':ro?'Mode view only.':'Pilih produk/jasa untuk auto isi deskripsi, satuan, dan harga.'}</div></div>${ro?'<button class="btn" onclick="toast(\'Dokumen\',\'Pilih: Unduh, Bagikan via Email, atau Cetak.\')">Bagikan/Cetak</button>':''}</div><div class="card"><div class="h2">Informasi Invoice</div><div class="grid"><div class="field"><label>Pelanggan</label><select id="cust" ${dis}><option>PT Sumber Makmur</option><option>Toko Berkah Jaya</option><option>CV Mandiri Sentosa</option><option>Warung Kopi Bahagia</option></select></div><div class="field"><label>Nama Sales</label><input id="salesName" ${dis} placeholder="Masukkan nama sales"></div><div class="field"><label>No invoice</label><input id="inv" ${dis}></div><div class="field"><label>Status invoice</label><select id="st" ${dis}><option value="draft">Draft</option><option value="unpaid">Belum Lunas</option><option value="paid">Lunas</option></select></div><div class="field"><label>Tanggal transaksi</label><input type="date" id="date" ${dis}></div></div></div><div class="card"><div class="h2">Daftar Produk / Jasa</div><div class="lineTable"><table><thead><tr><th style="width:210px">Produk/Jasa</th><th>Deskripsi</th><th>Qty</th><th>Satuan</th><th>Harga</th><th>Diskon (%)</th><th>Pajak</th><th>Tarif (%)</th><th>Jumlah</th><th></th></tr></thead><tbody id="items"></tbody></table></div>${ro||pay?'':'<button class="btn" style="margin-top:14px" onclick="addRow()">＋ Tambah produk/jasa</button>'}</div>${pay?paymentHtml():''}<div class="card"><div class="h2">Ringkasan Penjualan</div><div class="summary"><div class="box"><div class="line"><span>Total sebelum diskon</span><b id="beforeDisc">Rp 0</b></div><div class="line"><span>Total diskon</span><b id="discTotal">Rp 0</b></div><div class="line"><span>Subtotal setelah diskon</span><b id="afterDisc">Rp 0</b></div><div class="line"><span>Total pajak</span><b id="taxTotal">Rp 0</b></div></div><div class="box"><div class="total"><span>Total</span><span id="tot">Rp 0</span></div><div class="line"><span>Uang muka</span><input id="dp" ${dis} placeholder="Rp 0"></div><div class="total"><span>Sisa tagihan</span><span id="due">Rp 0</span></div></div></div><div class="actions" id="formActions"></div></div>`}function paymentHtml(){return `<div class="card"><div class="h2">Update Pembayaran</div><div class="grid"><div class="field"><label>Tanggal pembayaran</label><input type="date" id="payDate"></div><div class="field"><label>Nominal yang dibayarkan</label><input id="payAmount" placeholder="Rp 0"></div><div class="field"><label>Sisa pembayaran</label><input id="payRemain" disabled></div><div class="field"><label>Status setelah pembayaran</label><input id="payStatus" disabled></div></div></div>`}function openForm(i=null){editingIndex=i;hideList(i===null?'Tambah Penjualan':'Edit Penjualan');workPage.innerHTML=formHtml(i===null?'Tambah Penjualan':'Edit Penjualan');let s=i==null?null:sales[i];seed(s);cust.value=s?.cust||'PT Sumber Makmur';salesName.value=s?.sales||'';inv.value=s?.no||'';date.value=s?.date||'';st.value=s?.status||'draft';dp.value=s?.paid?rp(s.paid):'';renderRows();formActions.innerHTML=`<button class="btn" onclick="showList()">Batal</button><button class="btn primary" onclick="saveTx()">Simpan</button>`}function showDetail(i){let s=sales[i];hideList('Detail Penjualan');workPage.innerHTML=formHtml('Detail Penjualan',true);seed(s);cust.value=s.cust;salesName.value=s.sales||'';inv.value=s.no;date.value=s.date;if(st.querySelector(`option[value="${s.status}"]`))st.value=s.status;dp.value=s.paid?rp(s.paid):'';renderRows(true);let b=`<button class="btn" onclick="showList()">Kembali</button>`;let doc=s.status==='draft'?b+`<button class="btn" onclick="openForm(${i})">Edit</button><button class="btn danger" onclick="askDelete(${i})">Hapus</button>`:s.status==='unpaid'?b+`<button class="btn" onclick="showPayment(${i})">Update Pembayaran</button><button class="btn danger" onclick="askCancel(${i})">Batalkan</button>${s.paid===0?`<button class="btn danger" onclick="askVoid(${i})">Void</button>`:''}`:b;formActions.innerHTML=doc}function showPayment(i){let s=sales[i];hideList('Update Pembayaran');workPage.innerHTML=formHtml('Update Pembayaran',false,true);editingIndex=i;seed(s);cust.value=s.cust;salesName.value=s.sales||'';inv.value=s.no;date.value=s.date;st.value=s.status;dp.value=s.paid?rp(s.paid):'';renderRows(true);payDate.value=new Date().toISOString().slice(0,10);payRemain.value=rp(s.due);payStatus.value='Belum Lunas';payAmount.oninput=()=>{let left=Math.max(0,s.due-num(payAmount.value));payRemain.value=rp(left);payStatus.value=left===0?'Lunas':'Belum Lunas'};formActions.innerHTML=`<button class="btn" onclick="showList()">Batal</button><button class="btn primary" onclick="savePayment(${i})">Simpan Pembayaran</button>`}function savePayment(i){let p=num(payAmount.value);if(p<=0){toast('Nominal belum diisi','Isi nominal pembayaran dulu.');return}let s=sales[i],a=Math.min(p,s.due);s.paid+=a;s.due=Math.max(0,s.due-a);s.status=s.due===0?'paid':'unpaid';filter=s.status;setTab(filter);toast('Pembayaran tersimpan',`${s.no} sekarang ${label(s.status)}.`);showList()}function saveTx(){let c=calc(),status=st.value,no=inv.value||`INV-2026-${String(sales.length+1).padStart(4,'0')}`,paid=status==='paid'?c.total:num(dp.value),dueAmt=Math.max(0,c.total-paid);if(status==='draft'){paid=0;dueAmt=c.total}let obj={no,cust:cust.value||'Pelanggan Baru',sales:salesName.value||'',paid,due:dueAmt,status,date:date.value||new Date().toISOString().slice(0,10),items:rows.map(x=>[x.p||'Produk / Jasa',x.d||'',+x.q||1,x.u||'',+x.h||0,+x.disc||0,x.taxType||'PPN',+x.taxRate||0])};editingIndex==null?sales.unshift(obj):sales[editingIndex]=obj;filter=status;setTab(status);toast('Transaksi tersimpan',`Invoice ${no} masuk ke ${label(status)}.`);showList()}function setTab(f){document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.f===f))}q.oninput=e=>{query=e.target.value.toLowerCase();renderList()};document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{setTab(t.dataset.f);filter=t.dataset.f;renderList()});renderList();</script></body></html>
